<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видеозвонки — свободное общение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            user-select: none;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        /* Стеклянная панель */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        /* Видеоконтейнер с кубиками */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0f1c;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            background: #1e293b;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        @media (max-width: 640px) {
            .local-video { width: 80px; height: 80px; }
        }
        /* Анимированные кубики */
        .cubes-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            background: radial-gradient(circle at 30% 20%, #1e293b, #0a0f1c);
            z-index: 5;
        }
        .cube {
            width: 70px;
            height: 70px;
            background: rgba(59,130,246,0.2);
            border: 2px solid rgba(59,130,246,0.6);
            border-radius: 18px;
            transform: rotate(15deg);
            transition: all 0.05s linear;
            box-shadow: 0 0 5px rgba(59,130,246,0.3);
        }
        @media (max-width: 640px) {
            .cube { width: 45px; height: 45px; border-radius: 12px; }
        }
        .audio-only-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 20%, #1e293b, #0a0f1c);
            z-index: 5;
        }
        .audio-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 12px #3b82f6);
        }
        .control-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 56px;
            height: 56px;
            border-radius: 40px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
        }
        .control-btn:hover {
            transform: scale(1.07);
            background: #334155;
        }
        .control-btn-active {
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
        }
        .chat-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 320px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .chat-message {
            max-width: 85%;
            padding: 0.5rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .chat-message.own {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .chat-message.other {
            align-self: flex-start;
            background: #334155;
            color: #f1f5f9;
            border-bottom-left-radius: 0.25rem;
        }
        .chat-input-area {
            display: flex;
            gap: 0.6rem;
            padding: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }
        .chat-input:focus {
            border-color: #3b82f6;
        }
        .send-btn {
            background: #3b82f6;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            transition: 0.2s;
        }
        @media (min-width: 1024px) {
            .main-grid {
                display: grid;
                grid-template-columns: 1fr 320px;
                gap: 1.5rem;
            }
        }
        .debug-log {
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.4);
            border-radius: 1rem;
            padding: 0.7rem;
        }
    </style>
</head>
<body>
<div class="w-full max-w-6xl space-y-5">
    <!-- Панель управления звонком (без лишних надписей) -->
    <div class="glass-panel p-5 space-y-4">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-xs text-slate-400 mb-1">Ваш ID</label>
                <div class="flex gap-2">
                    <input type="text" id="myId" readonly class="flex-1 bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2 text-slate-200 font-mono text-sm">
                    <button onclick="copyId()" class="px-4 bg-slate-700 hover:bg-slate-600 rounded-xl">📋</button>
                </div>
            </div>
            <div class="flex-1">
                <label class="block text-xs text-slate-400 mb-1">ID собеседника</label>
                <div class="flex gap-2">
                    <input type="text" id="remoteId" placeholder="Вставьте ID" class="flex-1 bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2 text-slate-200">
                    <button onclick="startCall()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-semibold">📞 Позвонить</button>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="requestCamera()" class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl font-medium transition">🎥 Видео + микрофон</button>
            <button onclick="requestAudioOnly()" class="flex-1 py-2.5 bg-purple-600 hover:bg-purple-500 rounded-xl font-medium transition">🎤 Только микрофон</button>
        </div>
        <div id="statusMessage" class="text-center text-sm text-slate-400">Инициализация...</div>
        <div class="debug-log hidden" id="debugLog"></div>
    </div>

    <!-- Основная сетка: видео + чат -->
    <div class="main-grid">
        <div class="space-y-3">
            <div class="video-container" id="videoContainer" style="display: none;">
                <!-- удаленное видео -->
                <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                <!-- локальное видео (превью) -->
                <video id="localVideo" class="local-video hidden" autoplay playsinline muted></video>
                <!-- Кубики вместо черного окна -->
                <div id="cubesVisual" class="cubes-container">
                    <div class="cube" id="cube1"></div>
                    <div class="cube" id="cube2"></div>
                    <div class="cube" id="cube3"></div>
                </div>
                <!-- Плейсхолдер для аудиозвонка -->
                <div id="audioOnlyPlaceholder" class="audio-only-placeholder hidden">
                    <div class="audio-icon">🎤</div>
                </div>
                <!-- Оверлей вызова -->
                <div id="callingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm z-30 hidden">
                    <div class="w-16 h-16 rounded-full bg-emerald-500/30 flex items-center justify-center animate-pulse">
                        <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    </div>
                    <p class="text-white text-lg mt-3">Вызов...</p>
                </div>
            </div>

            <div class="flex justify-center gap-4 hidden" id="controls">
                <button id="micBtn" onclick="toggleMic()" class="control-btn">🎤</button>
                <button id="camBtn" onclick="toggleCamera()" class="control-btn hidden">📷</button>
                <button id="screenBtn" onclick="toggleScreenShare()" class="control-btn" title="Экран">🖥️</button>
                <button onclick="endCall()" class="control-btn bg-red-600 hover:bg-red-500">📴</button>
            </div>
        </div>

        <!-- Чат панель -->
        <div id="chatPanel" class="chat-panel hidden">
            <div class="px-4 py-2 border-b border-slate-700 font-medium text-sm">💬 Текст</div>
            <div id="chatMessages" class="chat-messages">
                <div class="text-center text-xs text-slate-500 p-3">Нет сообщений</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение..." maxlength="500">
                <button onclick="sendChatMessage()" class="send-btn">→</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Глобальные переменные ---
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let dataConnection = null;
    let isMicMuted = false;
    let isCamMuted = false;
    let hasVideo = false;
    let screenSharingActive = false;
    let originalVideoTrack = null;
    let ringInterval = null;
    let audioCtx = null;
    let mediaStreamSource = null;
    let analyser = null;
    let animationId = null;

    // DOM
    const myIdInput = document.getElementById('myId');
    const remoteIdInput = document.getElementById('remoteId');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const videoContainer = document.getElementById('videoContainer');
    const controlsDiv = document.getElementById('controls');
    const callingOverlay = document.getElementById('callingOverlay');
    const cubesContainer = document.getElementById('cubesVisual');
    const audioOnlyPlaceholder = document.getElementById('audioOnlyPlaceholder');
    const statusDiv = document.getElementById('statusMessage');
    const debugLog = document.getElementById('debugLog');
    const chatPanel = document.getElementById('chatPanel');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const cube1 = document.getElementById('cube1');
    const cube2 = document.getElementById('cube2');
    const cube3 = document.getElementById('cube3');

    function log(msg, type = 'info') {
        debugLog.classList.remove('hidden');
        const p = document.createElement('p');
        p.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-blue-300');
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugLog.appendChild(p);
        debugLog.scrollTop = debugLog.scrollHeight;
        console.log(msg);
    }

    // --- Визуализация голоса (кубики) ---
    async function initVoiceVisualization(stream) {
        if (animationId) cancelAnimationFrame(animationId);
        if (audioCtx) await audioCtx.close();
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            mediaStreamSource = audioCtx.createMediaStreamSource(stream);
            mediaStreamSource.connect(analyser);
            // не подключаем к динамику, чтобы не создавать эхо
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            function updateCubes() {
                if (!analyser || !cubesContainer || cubesContainer.style.display === 'none') {
                    animationId = requestAnimationFrame(updateCubes);
                    return;
                }
                analyser.getByteFrequencyData(dataArray);
                let avg = 0;
                for (let i = 0; i < bufferLength; i++) avg += dataArray[i];
                avg = avg / bufferLength;
                let intensity = Math.min(1, avg / 150);
                const scale = 0.5 + intensity * 1.2;
                const glow = `0px 0px ${12 + intensity * 20}px rgba(59,130,246,${0.4 + intensity * 0.6})`;
                const borderColor = `rgba(59,130,246,${0.5 + intensity * 0.5})`;
                [cube1, cube2, cube3].forEach((cube, idx) => {
                    const delay = idx * 0.1;
                    const s = scale * (1 + Math.sin(Date.now() * 0.008 + idx) * 0.1);
                    cube.style.transform = `rotate(15deg) scale(${s})`;
                    cube.style.borderColor = borderColor;
                    cube.style.boxShadow = glow;
                    cube.style.backgroundColor = `rgba(59,130,246,${0.1 + intensity * 0.3})`;
                });
                animationId = requestAnimationFrame(updateCubes);
            }
            updateCubes();
        } catch (e) {
            log('Визуализация голоса не активна: ' + e.message, 'error');
        }
    }

    function stopVoiceVisualization() {
        if (animationId) cancelAnimationFrame(animationId);
        if (mediaStreamSource) mediaStreamSource.disconnect();
        if (audioCtx) audioCtx.close().catch(e=>{});
        audioCtx = null;
    }

    // --- Звук звонка (телефонный) ---
    async function playRingtone() {
        stopRingtone();
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') await ctx.resume();
            const playBeep = (freq, duration, delay = 0) => {
                const now = ctx.currentTime + delay;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.25;
                osc.start(now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.stop(now + duration);
            };
            const ringPattern = () => {
                playBeep(800, 0.35);
                playBeep(1000, 0.35, 0.45);
            };
            ringPattern();
            ringInterval = setInterval(() => {
                if (ctx.state === 'closed') return;
                ringPattern();
            }, 2000);
            window._ringCtx = ctx;
        } catch(e) { log('Не удалось воспроизвести звонок', 'error'); }
    }
    function stopRingtone() {
        if (ringInterval) clearInterval(ringInterval);
        if (window._ringCtx) window._ringCtx.close().catch(()=>{});
        window._ringCtx = null;
    }

    // --- Чат ---
    function addChatMessage(text, isOwn = false) {
        if (chatMessagesDiv.children.length === 1 && chatMessagesDiv.children[0].innerText.includes('Нет сообщений')) {
            chatMessagesDiv.innerHTML = '';
        }
        const div = document.createElement('div');
        div.className = `chat-message ${isOwn ? 'own' : 'other'}`;
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    function sendChatMessage() {
        const txt = chatInput.value.trim();
        if (!txt || !dataConnection || dataConnection.open === false) return;
        dataConnection.send({ type: 'chat', message: txt });
        addChatMessage(txt, true);
        chatInput.value = '';
    }
    function setupDataConnection(conn) {
        if (dataConnection === conn) return;
        if (dataConnection) dataConnection.close();
        dataConnection = conn;
        dataConnection.on('open', () => { chatPanel.classList.remove('hidden'); log('Чат готов', 'success'); });
        dataConnection.on('data', (d) => { if (d?.type === 'chat') addChatMessage(d.message, false); });
        dataConnection.on('close', () => { if (dataConnection === conn) dataConnection = null; });
        if (dataConnection.open) chatPanel.classList.remove('hidden');
    }

    // --- Демонстрация экрана (исправленная) ---
    async function toggleScreenShare() {
        if (!currentCall) { log('Нет активного звонка', 'error'); return; }
        if (!localStream) { log('Нет медиапотока', 'error'); return; }
        if (screenSharingActive) {
            await stopScreenShare();
        } else {
            await startScreenShare();
        }
    }
    async function startScreenShare() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            const screenTrack = screenStream.getVideoTracks()[0];
            if (!screenTrack) throw new Error('Нет видео с экрана');

            // Ждём появления видеосендера в peerConnection (может быть не сразу)
            let videoSender = null;
            let attempts = 0;
            while (!videoSender && attempts < 15) {
                const pc = currentCall.peerConnection;
                if (pc) {
                    videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                }
                if (!videoSender) await new Promise(r => setTimeout(r, 200));
                attempts++;
            }
            if (!videoSender) throw new Error('Видеосендер не обнаружен в PeerConnection');

            if (!originalVideoTrack && localStream.getVideoTracks()[0]) {
                originalVideoTrack = localStream.getVideoTracks()[0];
            }
            await videoSender.replaceTrack(screenTrack);
            // обновляем локальный стрим
            localStream.getVideoTracks().forEach(t => { if (t !== screenTrack) { t.stop(); localStream.removeTrack(t); } });
            localStream.addTrack(screenTrack);
            localVideo.srcObject = localStream;
            localVideo.classList.remove('hidden');
            cubesContainer.style.display = 'none';
            audioOnlyPlaceholder.classList.add('hidden');
            hasVideo = true;
            screenSharingActive = true;
            document.getElementById('screenBtn').classList.add('bg-emerald-600');
            log('Демонстрация экрана активна', 'success');
            screenTrack.onended = () => stopScreenShare();
        } catch (err) {
            log('Ошибка экрана: ' + err.message, 'error');
        }
    }
    async function stopScreenShare() {
        if (!screenSharingActive) return;
        try {
            const pc = currentCall.peerConnection;
            const videoSender = pc?.getSenders().find(s => s.track?.kind === 'video');
            if (!videoSender) throw new Error('Нет сендера');
            let restoreTrack = null;
            if (originalVideoTrack && originalVideoTrack.readyState === 'live') restoreTrack = originalVideoTrack;
            else {
                const newCam = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                restoreTrack = newCam.getVideoTracks()[0];
                localStream.addTrack(restoreTrack);
                originalVideoTrack = restoreTrack;
            }
            await videoSender.replaceTrack(restoreTrack);
            localStream.getVideoTracks().forEach(t => { if (t !== restoreTrack) { t.stop(); localStream.removeTrack(t); } });
            localVideo.srcObject = localStream;
            if (isCamMuted) restoreTrack.enabled = false;
            screenSharingActive = false;
            document.getElementById('screenBtn').classList.remove('bg-emerald-600');
            if (!hasVideo && !isCamMuted) {
                // если камера была выключена, показываем кубики
                if (localStream.getVideoTracks().length === 0 || isCamMuted) {
                    cubesContainer.style.display = 'flex';
                    localVideo.classList.add('hidden');
                } else {
                    localVideo.classList.remove('hidden');
                }
            } else {
                localVideo.classList.remove('hidden');
                cubesContainer.style.display = 'none';
            }
            log('Экран выключен', 'success');
        } catch(e) { log('Ошибка остановки экрана: '+e.message, 'error'); }
    }

    // --- Медиа ---
    async function requestCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream;
            hasVideo = true;
            localVideo.srcObject = stream;
            localVideo.classList.remove('hidden');
            cubesContainer.style.display = 'none';
            audioOnlyPlaceholder.classList.add('hidden');
            document.getElementById('camBtn').classList.remove('hidden');
            originalVideoTrack = stream.getVideoTracks()[0];
            initVoiceVisualization(stream);
            log('Камера+микрофон готовы', 'success');
            statusDiv.innerText = '✅ Готово к звонку';
            return true;
        } catch(e) { return requestAudioOnly(); }
    }
    async function requestAudioOnly() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream;
            hasVideo = false;
            localVideo.classList.add('hidden');
            cubesContainer.style.display = 'flex';
            audioOnlyPlaceholder.classList.add('hidden');
            document.getElementById('camBtn').classList.add('hidden');
            initVoiceVisualization(stream);
            log('Микрофон готов (аудио)', 'success');
            statusDiv.innerText = '🎙 Аудиорежим';
            return true;
        } catch(e) { log('Нет доступа к медиа', 'error'); return false; }
    }

    // --- PeerJS ---
    function initPeer() {
        peer = new Peer({
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        });
        peer.on('open', id => { myIdInput.value = id; statusDiv.innerText = '✅ ID готов'; log(`Ваш ID: ${id}`, 'success'); });
        peer.on('call', call => {
            playRingtone();
            if (confirm('Входящий звонок. Принять?')) {
                stopRingtone();
                answerCall(call);
            } else { stopRingtone(); call.close(); }
        });
        peer.on('connection', conn => { if (!dataConnection) setupDataConnection(conn); });
        peer.on('error', err => log(`Peer ошибка: ${err.type}`, 'error'));
    }

    function startCall() {
        const rid = remoteIdInput.value.trim();
        if (!rid) return alert('Введите ID');
        if (!localStream) return alert('Разрешите микрофон/камеру');
        videoContainer.style.display = 'block';
        controlsDiv.classList.remove('hidden');
        callingOverlay.classList.remove('hidden');
        currentCall = peer.call(rid, localStream);
        handleCall(currentCall);
        const conn = peer.connect(rid, { label: 'chat', reliable: true });
        setupDataConnection(conn);
    }
    function answerCall(call) {
        if (!localStream) requestAudioOnly().then(() => call.answer(localStream));
        else call.answer(localStream);
        videoContainer.style.display = 'block';
        controlsDiv.classList.remove('hidden');
        currentCall = call;
        handleCall(call);
        const conn = peer.connect(call.peer, { label: 'chat' });
        setupDataConnection(conn);
    }
    function handleCall(call) {
        call.on('stream', remoteStream => {
            remoteVideo.srcObject = remoteStream;
            callingOverlay.classList.add('hidden');
            statusDiv.innerText = '🟢 В эфире';
            // если у удаленного нет видео, показываем кубики
            if (remoteStream.getVideoTracks().length === 0 || remoteStream.getVideoTracks()[0].readyState === 'ended') {
                cubesContainer.style.display = 'flex';
            } else {
                cubesContainer.style.display = 'none';
            }
        });
        call.on('close', () => endCallUI());
        call.on('error', () => endCallUI());
    }
    function endCall() {
        if (currentCall) currentCall.close();
        if (dataConnection) dataConnection.close();
        endCallUI();
    }
    function endCallUI() {
        remoteVideo.srcObject = null;
        videoContainer.style.display = 'none';
        controlsDiv.classList.add('hidden');
        callingOverlay.classList.add('hidden');
        chatPanel.classList.add('hidden');
        chatMessagesDiv.innerHTML = '<div class="text-center text-xs text-slate-500 p-3">Нет сообщений</div>';
        statusDiv.innerText = 'Звонок завершён';
        if (!hasVideo) cubesContainer.style.display = 'flex';
        else cubesContainer.style.display = 'none';
        stopRingtone();
        currentCall = null;
        dataConnection = null;
        screenSharingActive = false;
        document.getElementById('screenBtn')?.classList.remove('bg-emerald-600');
    }

    function toggleMic() {
        if (!localStream) return;
        isMicMuted = !isMicMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
        const btn = document.getElementById('micBtn');
        btn.textContent = isMicMuted ? '🔇' : '🎤';
        btn.classList.toggle('bg-red-600', isMicMuted);
    }
    function toggleCamera() {
        if (!localStream || !hasVideo || screenSharingActive) return;
        isCamMuted = !isCamMuted;
        localStream.getVideoTracks().forEach(t => t.enabled = !isCamMuted);
        const btn = document.getElementById('camBtn');
        btn.textContent = isCamMuted ? '📷❌' : '📷';
        btn.classList.toggle('bg-red-600', isCamMuted);
        if (isCamMuted) {
            cubesContainer.style.display = 'flex';
            localVideo.classList.add('hidden');
        } else {
            cubesContainer.style.display = 'none';
            localVideo.classList.remove('hidden');
        }
    }
    function copyId() { navigator.clipboard.writeText(myIdInput.value); log('ID скопирован', 'success'); }

    window.addEventListener('load', () => { initPeer(); requestCamera(); });
    window.addEventListener('beforeunload', () => { if (localStream) localStream.getTracks().forEach(t => t.stop()); if(peer) peer.destroy(); stopVoiceVisualization(); stopRingtone(); });
</script>
</body>
</html>
