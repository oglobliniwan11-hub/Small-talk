<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видеозвонки - Экран + Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video {
            position: absolute; bottom: 1rem; right: 1rem;
            width: 120px; height: 120px; object-fit: cover;
            border-radius: 0.75rem; border: 2px solid rgba(255, 255, 255, 0.2);
            background: #334155; z-index: 10;
        }
        @media (max-width: 640px) {
            .local-video { width: 80px; height: 80px; }
        }
        .control-btn {
            transition: all 0.2s ease;
        }
        .control-btn:hover { transform: scale(1.05); }
        .pulse-ring {
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .audio-only-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e293b, #334155);
            font-size: 4rem;
        }
        .debug-log {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .debug-log p {
            margin: 0.25rem 0;
            color: #94a3b8;
        }
        .debug-log .error { color: #ef4444; }
        .debug-log .success { color: #10b981; }
        .debug-log .info { color: #3b82f6; }

        /* Chat panel styles */
        .chat-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 300px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .chat-message {
            max-width: 85%;
            padding: 0.5rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            word-wrap: break-word;
        }
        .chat-message.own {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .chat-message.other {
            align-self: flex-start;
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 0.25rem;
        }
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            outline: none;
        }
        .chat-input:focus {
            border-color: #3b82f6;
        }
        .send-btn {
            background: #3b82f6;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .send-btn:hover {
            background: #2563eb;
        }
        @media (min-width: 1024px) {
            .main-grid {
                display: grid;
                grid-template-columns: 1fr 320px;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

<div class="w-full max-w-7xl space-y-6">
    <div class="text-center space-y-2">
        <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            Видеозвонки + Экран + Чат
        </h1>
        <p class="text-slate-400 text-sm">Без регистрации • Демонстрация экрана • Текстовый чат</p>
    </div>

    <div class="glass-panel rounded-2xl p-6 space-y-4">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">Ваш ID</label>
                <div class="flex gap-2">
                    <input type="text" id="myId" readonly
                           class="flex-1 bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 font-mono text-sm"
                           value="Загрузка...">
                    <button onclick="copyId()" class="p-2.5 bg-slate-700 hover:bg-slate-600 rounded-lg">📋</button>
                </div>
            </div>
            <div class="flex-1">
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">ID собеседника</label>
                <div class="flex gap-2">
                    <input type="text" id="remoteId" placeholder="Вставьте ID друга"
                           class="flex-1 bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 placeholder-slate-500">
                    <button onclick="startCall()"
                            class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg">
                        📞 Позвонить
                    </button>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-2">
            <button onclick="requestCamera()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg transition">
                📷 Видео + Микрофон
            </button>
            <button onclick="requestAudioOnly()" class="flex-1 py-3 bg-purple-600 hover:bg-purple-500 text-white font-medium rounded-lg transition">
                🎤 Только микрофон (без камеры)
            </button>
        </div>

        <div id="statusMessage" class="text-center text-sm text-slate-400">Инициализация...</div>

        <!-- Лог для диагностики -->
        <div class="debug-log hidden" id="debugLog">
            <p class="info">📋 Лог подключений:</p>
        </div>
    </div>

    <!-- Основная сетка: видео + чат -->
    <div class="main-grid">
        <!-- Видео блок -->
        <div class="space-y-4">
            <div class="video-container glass-panel hidden" id="videoContainer">
                <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                <video id="localVideo" class="local-video hidden" autoplay playsinline muted></video>

                <div id="audioOnlyPlaceholder" class="audio-only-placeholder hidden">
                    <div class="text-center">
                        <div class="text-6xl mb-2">🎤</div>
                        <div class="text-white text-lg">Аудиозвонок</div>
                    </div>
                </div>

                <div id="callingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-20 hidden">
                    <div class="w-20 h-20 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4 pulse-ring">
                        <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    </div>
                    <p class="text-xl font-semibold text-white">Вызов...</p>
                </div>
            </div>

            <div class="flex justify-center gap-4 hidden" id="controls">
                <button onclick="toggleMic()" id="micBtn" class="control-btn w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-white text-xl">🎤</button>
                <button onclick="toggleCamera()" id="camBtn" class="control-btn w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-white text-xl hidden">📷</button>
                <button onclick="toggleScreenShare()" id="screenBtn" class="control-btn w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-white text-xl" title="Демонстрация экрана">🖥️</button>
                <button onclick="endCall()" class="control-btn w-14 h-14 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center text-white text-xl">📴</button>
            </div>
        </div>

        <!-- Чат панель -->
        <div id="chatPanel" class="chat-panel hidden">
            <div class="px-4 py-2 border-b border-slate-700 flex items-center gap-2">
                <span class="text-sm font-semibold">💬 Чат во время звонка</span>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="text-center text-xs text-slate-500 p-2">Сообщения будут появляться здесь</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Напишите сообщение..." maxlength="500">
                <button onclick="sendChatMessage()" class="send-btn">Отправить</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== Глобальные переменные ====================
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let dataConnection = null;     // для чата
    let isMicMuted = false;
    let isCamMuted = false;
    let hasVideo = false;           // используется ли камера (или экран)
    let screenSharingActive = false;
    let originalVideoTrack = null;  // сохраняем оригинальный видеотрек камеры
    let ringtoneAudio = null;       // элемент для звука звонка
    let ringInterval = null;

    // DOM элементы
    const myIdInput = document.getElementById('myId');
    const remoteIdInput = document.getElementById('remoteId');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const statusMessage = document.getElementById('statusMessage');
    const videoContainer = document.getElementById('videoContainer');
    const controls = document.getElementById('controls');
    const callingOverlay = document.getElementById('callingOverlay');
    const audioOnlyPlaceholder = document.getElementById('audioOnlyPlaceholder');
    const camBtn = document.getElementById('camBtn');
    const screenBtn = document.getElementById('screenBtn');
    const debugLog = document.getElementById('debugLog');
    const chatPanel = document.getElementById('chatPanel');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    // ==================== Вспомогательные функции ====================
    function log(message, type = 'info') {
        debugLog.classList.remove('hidden');
        const p = document.createElement('p');
        p.className = type;
        const time = new Date().toLocaleTimeString();
        p.textContent = `[${time}] ${message}`;
        debugLog.appendChild(p);
        debugLog.scrollTop = debugLog.scrollHeight;
        console.log(`[${type}] ${message}`);
    }

    // Звуковое оповещение
    function playRingtone() {
        stopRingtone();
        try {
            // Генерируем простой звук через Web Audio (короткие бипы)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playBeep = () => {
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gain.gain.value = 0.3;
                oscillator.type = 'sine';
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
                oscillator.stop(audioCtx.currentTime + 0.8);
            };
            playBeep();
            ringInterval = setInterval(() => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playBeep();
            }, 2000);
        } catch(e) {
            log('Не удалось воспроизвести звук: ' + e.message, 'error');
        }
    }

    function stopRingtone() {
        if (ringInterval) {
            clearInterval(ringInterval);
            ringInterval = null;
        }
    }

    // Добавление сообщения в чат UI
    function addChatMessage(text, isOwn = false) {
        // Убираем заглушку если есть
        if (chatMessagesDiv.children.length === 1 && chatMessagesDiv.children[0].innerText.includes('Сообщения будут появляться здесь')) {
            chatMessagesDiv.innerHTML = '';
        }
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${isOwn ? 'own' : 'other'}`;
        msgDiv.innerHTML = `<span>${escapeHtml(text)}</span>`;
        chatMessagesDiv.appendChild(msgDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Отправка сообщения чата
    function sendChatMessage() {
        const text = chatInput.value.trim();
        if (!text) return;
        if (!dataConnection || dataConnection.open === false) {
            log('Чат-соединение не установлено', 'error');
            addChatMessage('❌ Нет активного соединения для чата', true);
            chatInput.value = '';
            return;
        }
        dataConnection.send({ type: 'chat', message: text });
        addChatMessage(text, true);
        chatInput.value = '';
    }

    // Установка data connection для чата
    function setupDataConnection(conn) {
        if (dataConnection === conn) return;
        if (dataConnection) {
            try { dataConnection.close(); } catch(e) {}
        }
        dataConnection = conn;
        dataConnection.on('open', () => {
            log('Чат-соединение открыто', 'success');
            chatPanel.classList.remove('hidden');
        });
        dataConnection.on('data', (data) => {
            if (data && data.type === 'chat') {
                addChatMessage(data.message, false);
            }
        });
        dataConnection.on('close', () => {
            log('Чат-соединение закрыто', 'info');
            if (dataConnection === conn) dataConnection = null;
        });
        dataConnection.on('error', (err) => log('Ошибка чата: ' + err, 'error'));
        if (dataConnection.open) {
            chatPanel.classList.remove('hidden');
        }
    }

    // ==================== Замена треков для демонстрации экрана ====================
    async function toggleScreenShare() {
        if (!currentCall) {
            log('Нет активного звонка', 'error');
            return;
        }
        if (!localStream) {
            log('Нет локального потока', 'error');
            return;
        }

        if (screenSharingActive) {
            // Останавливаем демонстрацию экрана и возвращаем камеру
            await stopScreenShare();
        } else {
            await startScreenShare();
        }
    }

    async function startScreenShare() {
        try {
            log('Запрос демонстрации экрана...', 'info');
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            const screenVideoTrack = screenStream.getVideoTracks()[0];
            if (!screenVideoTrack) throw new Error('Нет видеотрека экрана');

            // Получаем PeerConnection из вызова
            const pc = currentCall.peerConnection;
            if (!pc) throw new Error('PeerConnection не найден');

            // Находим видеосендер
            const senders = pc.getSenders();
            const videoSender = senders.find(sender => sender.track && sender.track.kind === 'video');
            if (!videoSender) throw new Error('Видеосендер не найден');

            // Сохраняем оригинальный видеотрек, если его еще нет
            if (!originalVideoTrack && localStream.getVideoTracks()[0]) {
                originalVideoTrack = localStream.getVideoTracks()[0];
            }

            // Заменяем трек
            await videoSender.replaceTrack(screenVideoTrack);
            // Также обновляем локальный стрим для отображения себя
            const newVideoTrack = screenVideoTrack;
            const oldVideoTracks = localStream.getVideoTracks();
            oldVideoTracks.forEach(track => {
                track.stop();
                localStream.removeTrack(track);
            });
            localStream.addTrack(newVideoTrack);
            localVideo.srcObject = localStream;
            localVideo.classList.remove('hidden');
            audioOnlyPlaceholder.classList.add('hidden');
            hasVideo = true;
            screenSharingActive = true;
            screenBtn.classList.add('bg-emerald-600');
            screenBtn.classList.remove('bg-slate-700');
            log('Демонстрация экрана активна', 'success');

            screenVideoTrack.onended = () => {
                if (screenSharingActive) stopScreenShare();
            };
        } catch (err) {
            log('Ошибка демонстрации экрана: ' + err.message, 'error');
        }
    }

    async function stopScreenShare() {
        if (!screenSharingActive) return;
        try {
            const pc = currentCall.peerConnection;
            if (!pc) throw new Error('PeerConnection не найден');
            const senders = pc.getSenders();
            const videoSender = senders.find(sender => sender.track && sender.track.kind === 'video');
            if (!videoSender) throw new Error('Видеосендер не найден');

            let restoreTrack = null;
            if (originalVideoTrack && originalVideoTrack.readyState === 'live') {
                restoreTrack = originalVideoTrack;
            } else if (localStream.getVideoTracks().length > 0 && localStream.getVideoTracks()[0].readyState === 'live') {
                restoreTrack = localStream.getVideoTracks()[0];
            } else {
                // Пытаемся перезапросить камеру
                const newStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                restoreTrack = newStream.getVideoTracks()[0];
                // Аудио не трогаем
            }
            if (restoreTrack) {
                await videoSender.replaceTrack(restoreTrack);
                // Обновляем локальный стрим
                const oldVideoTracks = localStream.getVideoTracks();
                oldVideoTracks.forEach(track => {
                    if (track !== restoreTrack) {
                        track.stop();
                        localStream.removeTrack(track);
                    }
                });
                if (!localStream.getVideoTracks().includes(restoreTrack)) {
                    localStream.addTrack(restoreTrack);
                }
                localVideo.srcObject = localStream;
                if (isCamMuted) {
                    restoreTrack.enabled = false;
                } else {
                    restoreTrack.enabled = true;
                }
                hasVideo = true;
                localVideo.classList.remove('hidden');
                audioOnlyPlaceholder.classList.add('hidden');
            } else {
                // Если камеры нет – переходим в режим без видео
                const oldVideoTracks = localStream.getVideoTracks();
                oldVideoTracks.forEach(track => {
                    track.stop();
                    localStream.removeTrack(track);
                });
                hasVideo = false;
                localVideo.classList.add('hidden');
                if (!localStream.getAudioTracks().length) {
                    // не должно случиться
                } else {
                    audioOnlyPlaceholder.classList.remove('hidden');
                }
                camBtn.classList.add('hidden');
            }
            screenSharingActive = false;
            screenBtn.classList.remove('bg-emerald-600');
            screenBtn.classList.add('bg-slate-700');
            log('Демонстрация экрана остановлена', 'info');
        } catch (err) {
            log('Ошибка остановки экрана: ' + err.message, 'error');
        }
    }

    // ==================== Инициализация Peer ====================
    function initPeer() {
        log('Инициализация PeerJS...', 'info');
        statusMessage.textContent = 'Подключение к серверу...';
        try {
            peer = new Peer({
                debug: 3,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun.cloudflare.com:3478' }
                    ]
                }
            });

            peer.on('open', function(id) {
                log('ID получен: ' + id, 'success');
                myIdInput.value = id;
                statusMessage.textContent = '✅ Готово! Скопируйте ваш ID и отправьте другу.';
                statusMessage.className = 'text-center text-sm text-emerald-400 font-medium';
            });

            peer.on('call', function(call) {
                log('Входящий звонок от: ' + call.peer, 'info');
                // Звуковое оповещение
                playRingtone();
                if (confirm('📞 Входящий звонок! Принять?')) {
                    stopRingtone();
                    answerCall(call);
                } else {
                    stopRingtone();
                    call.close();
                    log('Звонок отклонён', 'info');
                }
            });

            peer.on('connection', function(conn) {
                log('Входящее DataConnection от: ' + conn.peer, 'info');
                if (conn.label === 'chat' || !dataConnection) {
                    setupDataConnection(conn);
                }
            });

            peer.on('error', function(err) {
                log('Ошибка PeerJS: ' + err.type + ' - ' + err.message, 'error');
                statusMessage.textContent = '❌ Ошибка: ' + err.type;
                statusMessage.className = 'text-center text-sm text-red-400';
                if (err.type === 'unavailable-id') {
                    log('ID уже используется. Обновите страницу.', 'error');
                } else if (err.type === 'network') {
                    log('Сетевая ошибка. Проверьте подключение.', 'error');
                }
            });

            peer.on('disconnected', function() {
                log('Отключено от сервера. Переподключение...', 'error');
                peer.reconnect();
            });
        } catch (e) {
            log('Критическая ошибка: ' + e.message, 'error');
            statusMessage.textContent = '❌ Ошибка инициализации';
        }
    }

    // ==================== Запрос медиа ====================
    async function requestCamera() {
        try {
            log('Запрос доступа к камере и микрофону...', 'info');
            statusMessage.textContent = 'Запрос доступа...';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream;
            hasVideo = true;
            localVideo.srcObject = localStream;
            localVideo.classList.remove('hidden');
            audioOnlyPlaceholder.classList.add('hidden');
            camBtn.classList.remove('hidden');
            originalVideoTrack = localStream.getVideoTracks()[0] || null;
            log('Камера и микрофон подключены', 'success');
            statusMessage.textContent = '✅ Камера и микрофон готовы';
            return true;
        } catch (err) {
            log('Ошибка камеры: ' + err.message, 'error');
            return requestAudioOnly();
        }
    }

    async function requestAudioOnly() {
        try {
            log('Запрос доступа к микрофону...', 'info');
            const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream;
            hasVideo = false;
            localVideo.classList.add('hidden');
            audioOnlyPlaceholder.classList.remove('hidden');
            camBtn.classList.add('hidden');
            log('Микрофон подключен', 'success');
            statusMessage.textContent = '✅ Микрофон готов (аудиозвонок)';
            return true;
        } catch (err) {
            log('Ошибка микрофона: ' + err.message, 'error');
            statusMessage.textContent = '❌ Микрофон недоступен';
            return false;
        }
    }

    // ==================== Управление звонками ====================
    function startCall() {
        const remoteId = remoteIdInput.value.trim();
        if (!remoteId) { alert('Введите ID собеседника'); return; }
        if (!localStream) { alert('Сначала разрешите доступ к микрофону/камере'); return; }
        if (!peer) { alert('PeerJS не готов'); return; }

        log('Исходящий звонок на: ' + remoteId, 'info');
        statusMessage.textContent = 'Установка соединения...';
        callingOverlay.classList.remove('hidden');
        videoContainer.classList.remove('hidden');
        controls.classList.remove('hidden');

        currentCall = peer.call(remoteId, localStream);
        handleCall(currentCall);

        // Создаем DataConnection для чата
        const conn = peer.connect(remoteId, { label: 'chat', reliable: true });
        setupDataConnection(conn);
    }

    function answerCall(call) {
        log('Ответ на звонок от: ' + call.peer, 'info');
        if (!localStream) {
            requestAudioOnly().then(() => {
                if (localStream) {
                    videoContainer.classList.remove('hidden');
                    controls.classList.remove('hidden');
                    currentCall = call;
                    call.answer(localStream);
                    handleCall(call);
                    // Создаем исходящее data connection к звонящему
                    const conn = peer.connect(call.peer, { label: 'chat', reliable: true });
                    setupDataConnection(conn);
                }
            });
            return;
        }
        videoContainer.classList.remove('hidden');
        controls.classList.remove('hidden');
        currentCall = call;
        call.answer(localStream);
        handleCall(call);
        const conn = peer.connect(call.peer, { label: 'chat', reliable: true });
        setupDataConnection(conn);
    }

    function handleCall(call) {
        call.on('stream', function(remoteStream) {
            log('Получен поток от собеседника', 'success');
            remoteVideo.srcObject = remoteStream;
            callingOverlay.classList.add('hidden');
            statusMessage.textContent = '🟢 Звонок активен';
            statusMessage.className = 'text-center text-sm text-emerald-400 font-bold';
        });
        call.on('close', function() {
            log('Звонок завершён', 'info');
            endCallUI();
        });
        call.on('error', function(err) {
            log('Ошибка звонка: ' + err, 'error');
            endCallUI();
        });
    }

    function endCall() {
        log('Завершение звонка', 'info');
        if (currentCall) {
            currentCall.close();
            currentCall = null;
        }
        if (dataConnection) {
            dataConnection.close();
            dataConnection = null;
        }
        if (screenSharingActive) {
            screenSharingActive = false;
            screenBtn.classList.remove('bg-emerald-600');
            screenBtn.classList.add('bg-slate-700');
        }
        endCallUI();
    }

    function endCallUI() {
        remoteVideo.srcObject = null;
        videoContainer.classList.add('hidden');
        controls.classList.add('hidden');
        callingOverlay.classList.add('hidden');
        chatPanel.classList.add('hidden');
        chatMessagesDiv.innerHTML = '<div class="text-center text-xs text-slate-500 p-2">Сообщения будут появляться здесь</div>';
        statusMessage.textContent = 'Звонок завершён';
        statusMessage.className = 'text-center text-sm text-slate-400';
        remoteIdInput.value = '';
        stopRingtone();
    }

    // ==================== Управление микрофоном/камерой ====================
    function toggleMic() {
        if (!localStream) return;
        isMicMuted = !isMicMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
        const btn = document.getElementById('micBtn');
        btn.textContent = isMicMuted ? '🔇' : '🎤';
        btn.classList.toggle('bg-red-600', isMicMuted);
        btn.classList.toggle('bg-slate-700', !isMicMuted);
        log(isMicMuted ? 'Микрофон выключен' : 'Микрофон включён', 'info');
    }

    function toggleCamera() {
        if (!localStream || !hasVideo) return;
        isCamMuted = !isCamMuted;
        localStream.getVideoTracks().forEach(t => t.enabled = !isCamMuted);
        const btn = document.getElementById('camBtn');
        btn.textContent = isCamMuted ? '📷❌' : '📷';
        btn.classList.toggle('bg-red-600', isCamMuted);
        btn.classList.toggle('bg-slate-700', !isCamMuted);
        if (!screenSharingActive) {
            localVideo.classList.toggle('hidden', isCamMuted);
            audioOnlyPlaceholder.classList.toggle('hidden', !isCamMuted);
        }
        log(isCamMuted ? 'Камера выключена' : 'Камера включена', 'info');
    }

    function copyId() {
        const id = myIdInput.value;
        if (id && id !== 'Загрузка...') {
            navigator.clipboard.writeText(id).then(() => {
                log('ID скопирован', 'success');
                const old = statusMessage.textContent;
                statusMessage.textContent = '✅ ID скопирован!';
                setTimeout(() => statusMessage.textContent = old, 2000);
            });
        }
    }

    window.addEventListener('load', () => {
        log('Страница загружена', 'info');
        initPeer();
        requestCamera();
    });
    window.addEventListener('beforeunload', () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
        stopRingtone();
    });
</script>
</body>
</html>
