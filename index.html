<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Video Chat</title>
    <!-- Подключение иконок (FontAwesome для примера) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #141419 0%, #0b0b10 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 800px;
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .logo span { color: #4facfe; }

        .sub-logo {
            font-size: 0.8rem;
            color: #888;
            margin-top: -10px;
        }

        .connection-panel {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
            background: #1e1e24;
            border-radius: 12px;
            padding: 10px 15px;
            border: 1px solid #333;
        }

        .label {
            font-size: 0.8rem;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }

        .input-group div {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
            color: #ddd;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #777;
            cursor: pointer;
        }

        .main-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-video {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
        }

        .btn-audio {
            background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 100%);
            color: #fff;
        }

        .chat-section {
            margin-top: 20px;
        }

        .chat-message {
            background: #1e1e24;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #4facfe;
        }

        .chat-message .small-title {
            font-weight: bold;
            color: #aaa;
            margin-bottom: 5px;
        }

        .msg-text {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">Wave</div>
        <div class="sub-logo">Чистая луна, ясное общение</div>
    </div>

    <!-- IDs -->
    <div class="connection-panel">
        <div class="input-group">
            <span class="label">Ваш ID</span>
            <div>
                <span id="myId">20c8c139-0017-4fc0-9d7e-c52667bba4be</span>
                <button class="copy-btn" onclick="copyId()"><i class="fas fa-copy"></i></button>
            </div>
        </div>
        <div class="input-group">
            <span class="label">ID собеседника</span>
            <div>
                <span id="friendId">c18e7d9b-a723-4d17-8c98-046d73a3a1f4</span>
                <button class="copy-btn" onclick="copyId()"><i class="fas fa-copy"></i></button>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="main-buttons">
        <button class="btn btn-video" id="videoBtn">
            <i class="fas fa-video"></i> Видео + Микрофон
        </button>
        <button class="btn btn-audio" id="audioBtn">
            <i class="fas fa-microphone"></i> Только микрофон
        </button>
    </div>

    <!-- Chat/Status -->
    <div class="chat-section">
        <div class="chat-message">
            <div class="small-title">
                <span class="status-dot"></span> В эфире
            </div>
            <div class="msg-text">
                <strong>Вы не подключены.</strong> Нажмите "Переподключить".
            </div>
            <div style="margin-top: 10px;">
                <button class="btn btn-video" style="width: auto; padding: 5px 15px; font-size: 0.8rem;">Переподключение...</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Логика копирования
    function copyId() {
        alert("ID скопирован!");
    }
    
    // Логика кнопок
    document.getElementById('videoBtn').addEventListener('click', function() {
        console.log('Запуск видео + аудио...');
        alert('Начинаем трансляцию с видео!');
    });
    
    document.getElementById('audioBtn').addEventListener('click', function() {
        console.log('Запуск только аудио...');
        alert('Начинаем трансляцию только с микрофоном!');
    });
</script>

</body>
</html>
