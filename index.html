<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wave — видеозвонки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #030712 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0f1c;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
        }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video {
            position: absolute; bottom: 1rem; right: 1rem;
            width: 130px; height: 130px; object-fit: cover;
            border-radius: 1rem; border: 2px solid rgba(255,255,255,0.25);
            background: #1e293b; z-index: 20;
        }
        @media (max-width: 640px) { .local-video { width: 80px; height: 80px; } }
        
        .waves-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            border-radius: inherit;
        }
        
        .audio-only-placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 30% 20%, #111827, #030712);
            z-index: 5;
        }
        .control-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 56px; height: 56px; border-radius: 40px;
            background: #1e293b; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; cursor: pointer; border: none;
        }
        .control-btn:hover { transform: scale(1.05); background: #334155; }
        
        .chat-modal {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 20px 35px -10px black;
        }
        .chat-modal-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-modal-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .chat-modal-input {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-modal-input input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            outline: none;
        }
        .chat-modal-input button {
            background: #3b82f6;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .close-chat {
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        .chat-message {
            max-width: 85%;
            padding: 0.5rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .chat-message.own {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .chat-message.other {
            align-self: flex-start;
            background: #334155;
            color: #f1f5f9;
            border-bottom-left-radius: 0.25rem;
        }
        .hidden { display: none; }
        .wave-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .wave-svg { width: 100%; max-width: 220px; height: auto; margin-top: -10px; opacity: 0.7; }
        .round-call-btn {
            width: 48px; height: 48px; background-color: #10b981; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
            transition: 0.2s; cursor: pointer; border: none;
        }
        .round-call-btn:hover { background-color: #059669; transform: scale(1.05); }
        .debug-log {
            max-height: 130px; overflow-y: auto; font-family: monospace; font-size: 0.7rem;
            background: rgba(0,0,0,0.4); border-radius: 1rem; padding: 0.6rem;
        }
        .reconnect-btn {
            background: #3b82f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="w-full max-w-6xl space-y-5">
    <div class="text-center">
        <div class="wave-title">Wave</div>
        <svg class="wave-svg mx-auto" viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,10 Q25,0 50,10 T100,10 T150,10 T200,10" stroke="#60a5fa" fill="none" stroke-width="1.5" opacity="0.6"/>
            <path d="M0,13 Q25,3 50,13 T100,13 T150,13 T200,13" stroke="#34d399" fill="none" stroke-width="1.2" opacity="0.4"/>
        </svg>
        <div class="text-[0.7rem] text-slate-500 mt-0">чистый звук · живое общение</div>
    </div>

    <div class="glass-panel p-5 space-y-4">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-xs text-slate-400 mb-1">Ваш ID</label>
                <div class="flex gap-2">
                    <input type="text" id="myId" readonly class="flex-1 bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2 text-slate-200 font-mono text-sm">
                    <button onclick="copyId()" class="px-4 bg-slate-700 hover:bg-slate-600 rounded-xl">📋</button>
                </div>
            </div>
            <div class="flex-1">
                <label class="block text-xs text-slate-400 mb-1">ID собеседника</label>
                <div class="flex gap-2 items-center">
                    <input type="text" id="remoteId" placeholder="Вставьте ID" class="flex-1 bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2 text-slate-200">
                    <button id="callButton" onclick="startCall()" class="round-call-btn" title="Позвонить">📞</button>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="requestCamera()" class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl font-medium">🎥 Видео + микрофон</button>
            <button onclick="requestAudioOnly()" class="flex-1 py-2.5 bg-purple-600 hover:bg-purple-500 rounded-xl font-medium">🎤 Только микрофон</button>
        </div>
        <div id="statusMessage" class="text-center text-sm text-slate-300">Инициализация...</div>
        <div class="debug-log hidden" id="debugLog"></div>
    </div>

    <div class="main-grid">
        <div class="space-y-3">
            <div class="video-container" id="videoContainer" style="display: none;">
                <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                <video id="localVideo" class="local-video hidden" autoplay playsinline muted></video>
                <canvas id="wavesCanvas" class="waves-canvas" width="800" height="450"></canvas>
                <div id="audioOnlyPlaceholder" class="audio-only-placeholder hidden">
                    <div class="text-6xl opacity-70">🎤</div>
                </div>
                <div id="callingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm z-30 hidden">
                    <div class="w-16 h-16 rounded-full bg-emerald-500/30 flex items-center justify-center animate-pulse">
                        <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    </div>
                    <p class="text-white text-lg mt-3">Вызов...</p>
                </div>
            </div>

            <div class="flex justify-center gap-4 hidden" id="controls">
                <button id="micBtn" onclick="toggleMic()" class="control-btn">🎤</button>
                <button id="camBtn" onclick="toggleCamera()" class="control-btn hidden">📷</button>
                <button id="screenBtn" onclick="toggleScreenShare()" class="control-btn hidden" title="Показать экран">🖥️</button>
                <button id="chatBtn" onclick="toggleChatModal()" class="control-btn" title="Чат">💬</button>
                <button id="hangupBtn" onclick="endCall()" class="control-btn bg-red-600 hover:bg-red-500" style="background:#dc2626;">📞</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно чата -->
<div id="chatModal" class="chat-modal hidden">
    <div class="chat-modal-header">
        <span>💬 Чат</span>
        <div style="display: flex; gap: 8px;">
            <span class="reconnect-btn" onclick="reconnectChat()">🔄 Переподключить</span>
            <span class="close-chat" onclick="toggleChatModal()">✕</span>
        </div>
    </div>
    <div id="chatModalMessages" class="chat-modal-messages">
        <div class="text-center text-xs text-slate-500 p-3">Нет сообщений</div>
    </div>
    <div class="chat-modal-input">
        <input type="text" id="chatModalInput" placeholder="Сообщение..." maxlength="500">
        <button onclick="sendChatMessageModal()">→</button>
    </div>
</div>

<script>
    let peer = null, localStream = null, currentCall = null, dataConnection = null;
    let isMicMuted = false, isCamMuted = false, hasVideo = false, screenSharingActive = false;
    let originalVideoTrack = null, ringInterval = null;
    let canvasAnimId = null;
    let remotePeerId = null; // запоминаем ID собеседника для переподключения чата

    // DOM
    const myIdInput = document.getElementById('myId'), remoteIdInput = document.getElementById('remoteId');
    const localVideo = document.getElementById('localVideo'), remoteVideo = document.getElementById('remoteVideo');
    const videoContainer = document.getElementById('videoContainer'), controlsDiv = document.getElementById('controls');
    const callingOverlay = document.getElementById('callingOverlay');
    const wavesCanvas = document.getElementById('wavesCanvas');
    const audioOnlyPlaceholder = document.getElementById('audioOnlyPlaceholder');
    const statusDiv = document.getElementById('statusMessage');
    const debugLog = document.getElementById('debugLog'), screenBtn = document.getElementById('screenBtn');
    const chatModal = document.getElementById('chatModal');
    const chatModalMessages = document.getElementById('chatModalMessages');
    const chatModalInput = document.getElementById('chatModalInput');

    function log(msg, type = 'info') {
        debugLog.classList.remove('hidden');
        const p = document.createElement('p');
        p.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-blue-300');
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugLog.appendChild(p);
        debugLog.scrollTop = debugLog.scrollHeight;
        console.log(msg);
    }

    // -------- Волны ----------
    let wavePoints = [];
    let wavePhase = 0;
    let waveSpeed = 0.02;
    
    function initWaves() {
        if (!wavesCanvas) return;
        const ctx = wavesCanvas.getContext('2d');
        let width = wavesCanvas.clientWidth, height = wavesCanvas.clientHeight;
        wavesCanvas.width = width;
        wavesCanvas.height = height;
        
        const perimeterPoints = [];
        const numPoints = 40;
        for (let i = 0; i < numPoints; i++) {
            let t = i / numPoints;
            let x, y;
            if (t < 0.25) { x = t * 4; y = 0; }
            else if (t < 0.5) { x = 1; y = (t - 0.25) * 4; }
            else if (t < 0.75) { x = 1 - (t - 0.5) * 4; y = 1; }
            else { x = 0; y = 1 - (t - 0.75) * 4; }
            perimeterPoints.push({ x: x * width, y: y * height });
        }
        
        wavePoints = [];
        for (let layer = 0; layer < 3; layer++) {
            let points = perimeterPoints.map(p => ({
                origX: p.x, origY: p.y,
                amp: 5 + layer * 8
            }));
            wavePoints.push(points);
        }
        
        function drawWaves() {
            if (!wavesCanvas || wavesCanvas.style.display === 'none') {
                if (canvasAnimId) cancelAnimationFrame(canvasAnimId);
                return;
            }
            const ctx = wavesCanvas.getContext('2d');
            ctx.clearRect(0, 0, wavesCanvas.width, wavesCanvas.height);
            wavePhase += waveSpeed;
            for (let layer = 0; layer < wavePoints.length; layer++) {
                const points = wavePoints[layer];
                ctx.beginPath();
                ctx.strokeStyle = `rgba(96, 165, 250, ${0.2 + layer * 0.2})`;
                ctx.lineWidth = 2 + layer;
                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const angle = wavePhase * (1 + layer) + i * 0.5;
                    const offsetX = Math.sin(angle) * p.amp * 0.7;
                    const offsetY = Math.cos(angle * 0.7) * p.amp * 0.5;
                    const x = p.origX + offsetX;
                    const y = p.origY + offsetY;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                const first = points[0];
                ctx.lineTo(first.origX + Math.sin(wavePhase) * first.amp, first.origY + Math.cos(wavePhase*0.7) * first.amp);
                ctx.stroke();
            }
            canvasAnimId = requestAnimationFrame(drawWaves);
        }
        drawWaves();
    }
    
    function stopWaves() {
        if (canvasAnimId) cancelAnimationFrame(canvasAnimId);
        if (wavesCanvas) {
            const ctx = wavesCanvas.getContext('2d');
            ctx.clearRect(0, 0, wavesCanvas.width, wavesCanvas.height);
        }
    }
    
    function resizeCanvas() {
        if (!wavesCanvas) return;
        const rect = wavesCanvas.parentElement.getBoundingClientRect();
        wavesCanvas.width = rect.width;
        wavesCanvas.height = rect.height;
        initWaves();
    }

    // -------- Чат ----------
    function toggleChatModal() {
        if (chatModal.classList.contains('hidden')) {
            chatModal.classList.remove('hidden');
        } else {
            chatModal.classList.add('hidden');
        }
    }

    function addChatMessageToModal(text, isOwn = false) {
        if (chatModalMessages.children.length === 1 && chatModalMessages.children[0].innerText.includes('Нет сообщений')) {
            chatModalMessages.innerHTML = '';
        }
        const div = document.createElement('div');
        div.className = `chat-message ${isOwn ? 'own' : 'other'}`;
        div.innerText = text;
        chatModalMessages.appendChild(div);
        chatModalMessages.scrollTop = chatModalMessages.scrollHeight;
    }

    function sendChatMessageModal() {
        const txt = chatModalInput.value.trim();
        if (!txt) return;
        if (!dataConnection || dataConnection.open === false) {
            log('Чат не активен', 'error');
            addChatMessageToModal('❌ Нет соединения', true);
            return;
        }
        dataConnection.send({ type: 'chat', message: txt });
        addChatMessageToModal(txt, true);
        chatModalInput.value = '';
    }

    function setupDataConnection(conn, isInitiator = false) {
        if (dataConnection === conn) return;
        if (dataConnection) {
            dataConnection.close();
        }
        dataConnection = conn;
        dataConnection.on('open', () => {
            log('Чат соединение открыто', 'success');
            addChatMessageToModal('📡 Чат готов', false);
        });
        dataConnection.on('data', (d) => {
            if (d && d.type === 'chat') {
                addChatMessageToModal(d.message, false);
            }
        });
        dataConnection.on('close', () => {
            log('Чат закрыт', 'info');
            if (dataConnection === conn) dataConnection = null;
        });
        dataConnection.on('error', (err) => log('Ошибка чата: ' + err, 'error'));
        
        if (dataConnection.open) {
            addChatMessageToModal('📡 Чат готов', false);
        } else if (isInitiator) {
            let attempts = 0;
            const interval = setInterval(() => {
                if (dataConnection && dataConnection.open) {
                    clearInterval(interval);
                    addChatMessageToModal('📡 Чат готов', false);
                } else if (attempts >= 10) {
                    clearInterval(interval);
                    log('Не удалось открыть чат', 'error');
                    addChatMessageToModal('❌ Чат не подключился', false);
                }
                attempts++;
            }, 1000);
        }
    }

    function reconnectChat() {
        if (!remotePeerId) {
            addChatMessageToModal('❌ Нет активного собеседника', true);
            return;
        }
        if (dataConnection) {
            dataConnection.close();
            dataConnection = null;
        }
        log('Повторное создание чат-соединения...', 'info');
        const conn = peer.connect(remotePeerId, { label: 'chat', reliable: true });
        setupDataConnection(conn, true);
    }

    // -------- Звук звонка ----------
    function playRingtone() {
        stopRingtone();
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            const playBeep = (freq, duration, delay = 0) => {
                const now = ctx.currentTime + delay;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq; gain.gain.value = 0.25;
                osc.start(now); gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.stop(now + duration);
            };
            const ringPattern = () => { playBeep(800, 0.35); playBeep(1000, 0.35, 0.45); };
            ringPattern();
            ringInterval = setInterval(() => { if (ctx.state !== 'closed') ringPattern(); }, 2000);
            window._ringCtx = ctx;
        } catch(e) { log('Звук звонка не поддерживается', 'error'); }
    }
    function stopRingtone() { if (ringInterval) clearInterval(ringInterval); if (window._ringCtx) window._ringCtx.close().catch(()=>{}); window._ringCtx = null; }

    // -------- Демонстрация экрана ----------
    function isScreenShareSupported() { return !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia); }
    function updateScreenButtonVisibility() {
        if (!controlsDiv.classList.contains('hidden') && hasVideo && !screenSharingActive && isScreenShareSupported()) screenBtn.classList.remove('hidden');
        else screenBtn.classList.add('hidden');
    }
    async function toggleScreenShare() {
        if (!currentCall) { log('Нет активного звонка', 'error'); return; }
        if (!localStream) { log('Нет медиапотока', 'error'); return; }
        if (!hasVideo) { log('Невозможно показать экран: нет видеотрека. Включите камеру.', 'error'); return; }
        if (!isScreenShareSupported()) { log('Ваш браузер не поддерживает демонстрацию экрана (требуется HTTPS и современный браузер).', 'error'); return; }
        if (screenSharingActive) await stopScreenShare();
        else await startScreenShare();
    }
    async function startScreenShare() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            const screenTrack = screenStream.getVideoTracks()[0];
            if (!screenTrack) throw new Error('Нет видео с экрана');
            let videoSender = null;
            for (let i = 0; i < 20; i++) { const pc = currentCall.peerConnection; if (pc) videoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video'); if (videoSender) break; await new Promise(r => setTimeout(r, 200)); }
            if (!videoSender) throw new Error('Видеосендер не найден. Убедитесь, что у вас включена камера.');
            if (!originalVideoTrack && localStream.getVideoTracks()[0]) originalVideoTrack = localStream.getVideoTracks()[0];
            await videoSender.replaceTrack(screenTrack);
            localStream.getVideoTracks().forEach(t => { if (t !== screenTrack) { t.stop(); localStream.removeTrack(t); } });
            localStream.addTrack(screenTrack);
            localVideo.srcObject = localStream;
            localVideo.classList.remove('hidden');
            wavesCanvas.style.display = 'none';
            audioOnlyPlaceholder.classList.add('hidden');
            screenSharingActive = true;
            screenBtn.classList.add('bg-emerald-600');
            log('Демонстрация экрана активна', 'success');
            screenTrack.onended = () => { if (screenSharingActive) stopScreenShare(); };
        } catch (err) { log('Ошибка экрана: ' + err.message, 'error'); }
    }
    async function stopScreenShare() {
        if (!screenSharingActive) return;
        try {
            const pc = currentCall.peerConnection;
            const videoSender = pc?.getSenders().find(s => s.track?.kind === 'video');
            if (!videoSender) throw new Error('Нет видеосендера');
            let restoreTrack = null;
            if (originalVideoTrack && originalVideoTrack.readyState === 'live') restoreTrack = originalVideoTrack;
            else if (localStream.getVideoTracks().length > 0 && localStream.getVideoTracks()[0].readyState === 'live') restoreTrack = localStream.getVideoTracks()[0];
            else { const newCam = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); restoreTrack = newCam.getVideoTracks()[0]; localStream.addTrack(restoreTrack); originalVideoTrack = restoreTrack; }
            if (restoreTrack) {
                await videoSender.replaceTrack(restoreTrack);
                localStream.getVideoTracks().forEach(t => { if (t !== restoreTrack) { t.stop(); localStream.removeTrack(t); } });
                localVideo.srcObject = localStream;
                if (isCamMuted) restoreTrack.enabled = false;
            }
            screenSharingActive = false;
            screenBtn.classList.remove('bg-emerald-600');
            if (!hasVideo || isCamMuted) { wavesCanvas.style.display = 'block'; localVideo.classList.add('hidden'); }
            else { wavesCanvas.style.display = 'none'; localVideo.classList.remove('hidden'); }
            updateScreenButtonVisibility();
            log('Экран выключен', 'success');
        } catch(e) { log('Ошибка остановки экрана: ' + e.message, 'error'); }
    }

    // -------- Медиа ----------
    async function requestCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream; hasVideo = true;
            localVideo.srcObject = stream; localVideo.classList.remove('hidden');
            wavesCanvas.style.display = 'none'; audioOnlyPlaceholder.classList.add('hidden');
            document.getElementById('camBtn').classList.remove('hidden');
            originalVideoTrack = stream.getVideoTracks()[0];
            updateScreenButtonVisibility();
            log('Камера + микрофон готовы', 'success');
            statusDiv.innerText = '✅ Готово к звонку';
            return true;
        } catch(e) { log('Камера недоступна, переключаем на аудио', 'info'); return requestAudioOnly(); }
    }
    async function requestAudioOnly() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = stream; hasVideo = false;
            localVideo.classList.add('hidden'); wavesCanvas.style.display = 'block';
            audioOnlyPlaceholder.classList.add('hidden');
            document.getElementById('camBtn').classList.add('hidden');
            updateScreenButtonVisibility();
            log('Микрофон готов (аудиорежим)', 'success');
            statusDiv.innerText = '🎙 Аудиорежим';
            return true;
        } catch(e) { log('Нет доступа к микрофону', 'error'); return false; }
    }

    // -------- PeerJS ----------
    function initPeer() {
        peer = new Peer({ config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });
        peer.on('open', id => { myIdInput.value = id; statusDiv.innerText = '✅ ID готов'; log(`Ваш ID: ${id}`, 'success'); });
        peer.on('call', call => { 
            playRingtone(); 
            if (confirm('Входящий звонок. Принять?')) { 
                stopRingtone(); 
                remotePeerId = call.peer;
                answerCall(call); 
            } else { stopRingtone(); call.close(); } 
        });
        peer.on('connection', conn => {
            log(`Входящее DataConnection от ${conn.peer}`, 'info');
            if (!dataConnection) {
                setupDataConnection(conn, false);
            } else {
                log('Замена DataConnection', 'info');
                setupDataConnection(conn, false);
            }
        });
        peer.on('error', err => log(`Peer ошибка: ${err.type}`, 'error'));
    }

    function startCall() {
        const rid = remoteIdInput.value.trim();
        if (!rid) return alert('Введите ID собеседника');
        if (!localStream) return alert('Разрешите доступ к микрофону/камере');
        remotePeerId = rid;
        videoContainer.style.display = 'block'; controlsDiv.classList.remove('hidden'); callingOverlay.classList.remove('hidden');
        currentCall = peer.call(rid, localStream);
        handleCall(currentCall);
        
        if (!dataConnection) {
            const conn = peer.connect(rid, { label: 'chat', reliable: true });
            setupDataConnection(conn, true);
            log('Создаём чат-соединение (инициатор)', 'info');
        }
        updateScreenButtonVisibility();
        log('Исходящий звонок', 'info');
    }

    function answerCall(call) {
        remotePeerId = call.peer;
        if (!localStream) requestAudioOnly().then(() => call.answer(localStream));
        else call.answer(localStream);
        videoContainer.style.display = 'block'; controlsDiv.classList.remove('hidden');
        currentCall = call; handleCall(call);
        updateScreenButtonVisibility();
        log('Входящий звонок принят', 'info');
    }

    function handleCall(call) {
        call.on('stream', remoteStream => {
            remoteVideo.srcObject = remoteStream;
            callingOverlay.classList.add('hidden');
            statusDiv.innerText = '🟢 В эфире';
            if (remoteStream.getVideoTracks().length === 0 || remoteStream.getVideoTracks()[0].readyState === 'ended') {
                wavesCanvas.style.display = 'block';
            } else {
                wavesCanvas.style.display = 'none';
            }
        });
        call.on('close', () => endCallUI());
        call.on('error', () => endCallUI());
    }

    function endCall() { if (currentCall) currentCall.close(); if (dataConnection) dataConnection.close(); endCallUI(); }
    function endCallUI() {
        remoteVideo.srcObject = null; videoContainer.style.display = 'none'; controlsDiv.classList.add('hidden');
        callingOverlay.classList.add('hidden');
        chatModal.classList.add('hidden');
        chatModalMessages.innerHTML = '<div class="text-center text-xs text-slate-500 p-3">Нет сообщений</div>';
        statusDiv.innerText = 'Звонок завершён';
        if (!hasVideo) wavesCanvas.style.display = 'block'; else wavesCanvas.style.display = 'none';
        stopRingtone(); currentCall = null; 
        if (dataConnection) { dataConnection.close(); dataConnection = null; }
        screenSharingActive = false;
        screenBtn.classList.remove('bg-emerald-600'); updateScreenButtonVisibility();
        remotePeerId = null;
    }

    function toggleMic() {
        if (!localStream) return;
        isMicMuted = !isMicMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
        const btn = document.getElementById('micBtn');
        btn.textContent = isMicMuted ? '🔇' : '🎤';
        btn.classList.toggle('bg-red-600', isMicMuted);
    }
    function toggleCamera() {
        if (!localStream || !hasVideo || screenSharingActive) return;
        isCamMuted = !isCamMuted;
        localStream.getVideoTracks().forEach(t => t.enabled = !isCamMuted);
        const btn = document.getElementById('camBtn');
        btn.textContent = isCamMuted ? '📷❌' : '📷';
        btn.classList.toggle('bg-red-600', isCamMuted);
        if (isCamMuted) { wavesCanvas.style.display = 'block'; localVideo.classList.add('hidden'); }
        else { wavesCanvas.style.display = 'none'; localVideo.classList.remove('hidden'); }
        updateScreenButtonVisibility();
    }
    function copyId() { navigator.clipboard.writeText(myIdInput.value); log('ID скопирован', 'success'); }

    window.addEventListener('load', () => { 
        initPeer(); 
        requestCamera().then(() => {
            initWaves();
            window.addEventListener('resize', () => { resizeCanvas(); });
        });
    });
    window.addEventListener('beforeunload', () => { if (localStream) localStream.getTracks().forEach(t => t.stop()); if (peer) peer.destroy(); stopWaves(); stopRingtone(); });
</script>
</body>
</html>
