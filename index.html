<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеозвонки - Без ограничений</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video {
            position: absolute; bottom: 1rem; right: 1rem;
            width: 120px; height: 120px; object-fit: cover;
            border-radius: 0.75rem; border: 2px solid rgba(255, 255, 255, 0.2);
            background: #334155; z-index: 10;
        }
        @media (max-width: 640px) {
            .local-video { width: 80px; height: 80px; }
        }
        .control-btn { transition: all 0.2s ease; }
        .control-btn:hover { transform: scale(1.05); }
        .pulse-ring { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .audio-only-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e293b, #334155);
            font-size: 4rem;
        }
        .debug-log {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .debug-log p {
            margin: 0.25rem 0;
            color: #94a3b8;
        }
        .debug-log .error { color: #ef4444; }
        .debug-log .success { color: #10b981; }
        .debug-log .info { color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-4xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                Видеозвонки
            </h1>
            <p class="text-slate-400 text-sm">Без регистрации и ограничений по времени</p>
        </div>

        <div class="glass-panel rounded-2xl p-6 space-y-4">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">Ваш ID</label>
                    <div class="flex gap-2">
                        <input type="text" id="myId" readonly 
                            class="flex-1 bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 font-mono text-sm"
                            value="Загрузка...">
                        <button onclick="copyId()" class="p-2.5 bg-slate-700 hover:bg-slate-600 rounded-lg">📋</button>
                    </div>
                </div>
                
                <div class="flex-1">
                    <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">ID собеседника</label>
                    <div class="flex gap-2">
                        <input type="text" id="remoteId" placeholder="Вставьте ID друга" 
                            class="flex-1 bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 placeholder-slate-500">
                        <button onclick="startCall()" 
                            class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg">
                            📞 Позвонить
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-2">
                <button onclick="requestCamera()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg transition">
                    📷 Видео + Микрофон
                </button>
                <button onclick="requestAudioOnly()" class="flex-1 py-3 bg-purple-600 hover:bg-purple-500 text-white font-medium rounded-lg transition">
                    🎤 Только микрофон (без камеры)
                </button>
            </div>

            <div id="statusMessage" class="text-center text-sm text-slate-400">Инициализация...</div>
            
            <!-- Лог для диагностики -->
            <div class="debug-log hidden" id="debugLog">
                <p class="info">📋 Лог подключений:</p>
            </div>
        </div>

        <div class="video-container glass-panel hidden" id="videoContainer">
            <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
            <video id="localVideo" class="local-video hidden" autoplay playsinline muted></video>
            
            <div id="audioOnlyPlaceholder" class="audio-only-placeholder hidden">
                <div class="text-center">
                    <div class="text-6xl mb-2">🎤</div>
                    <div class="text-white text-lg">Аудиозвонок</div>
                </div>
            </div>
            
            <div id="callingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-20 hidden">
                <div class="w-20 h-20 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4 pulse-ring">
                    <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                </div>
                <p class="text-xl font-semibold text-white">Вызов...</p>
            </div>
        </div>

        <div class="flex justify-center gap-4 hidden" id="controls">
            <button onclick="toggleMic()" id="micBtn" class="control-btn w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-white">🎤</button>
            <button onclick="toggleCamera()" id="camBtn" class="control-btn w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-white hidden">📷</button>
            <button onclick="endCall()" class="control-btn w-14 h-14 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center text-white">📴</button>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let currentCall = null;
        let isMicMuted = false;
        let isCamMuted = false;
        let hasVideo = false;

        const myIdInput = document.getElementById('myId');
        const remoteIdInput = document.getElementById('remoteId');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusMessage = document.getElementById('statusMessage');
        const videoContainer = document.getElementById('videoContainer');
        const controls = document.getElementById('controls');
        const callingOverlay = document.getElementById('callingOverlay');
        const audioOnlyPlaceholder = document.getElementById('audioOnlyPlaceholder');
        const camBtn = document.getElementById('camBtn');
        const debugLog = document.getElementById('debugLog');

        function log(message, type = 'info') {
            debugLog.classList.remove('hidden');
            const p = document.createElement('p');
            p.className = type;
            const time = new Date().toLocaleTimeString();
            p.textContent = `[${time}] ${message}`;
            debugLog.appendChild(p);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${type}] ${message}`);
        }

        function initPeer() {
            log('Инициализация PeerJS...', 'info');
            statusMessage.textContent = 'Подключение к серверу...';
            
            try {
                peer = new Peer({
                    host: '193.160.208.198',
                    port: 10000,
                    path: '/peerjs',
                    secure: false,
                    debug: 3,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun.cloudflare.com:3478' }
                        ]
                    }
                });

                peer.on('open', function(id) {
                    log('ID получен: ' + id, 'success');
                    myIdInput.value = id;
                    statusMessage.textContent = '✅ Готово! Скопируйте ваш ID и отправьте другу.';
                    statusMessage.className = 'text-center text-sm text-emerald-400 font-medium';
                });

                peer.on('call', function(call) {
                    log('Входящий звонок от: ' + call.peer, 'info');
                    if (confirm('Входящий звонок. Принять?')) {
                        answerCall(call);
                    } else {
                        call.close();
                        log('Звонок отклонён', 'info');
                    }
                });

                peer.on('error', function(err) {
                    log('Ошибка PeerJS: ' + err.type + ' - ' + err.message, 'error');
                    statusMessage.textContent = '❌ Ошибка: ' + err.type;
                    statusMessage.className = 'text-center text-sm text-red-400';
                    
                    if (err.type === 'unavailable-id') {
                        log('ID уже используется. Попробуйте обновить страницу.', 'error');
                    } else if (err.type === 'network') {
                        log('Сетевая ошибка. Проверьте подключение к серверу.', 'error');
                        log('Откройте https://peerjs-server-n709.onrender.com чтобы "разбудить" сервер', 'info');
                    }
                });

                peer.on('disconnected', function() {
                    log('Отключено от сервера. Переподключение...', 'error');
                    peer.reconnect();
                });

                peer.on('connection', function(conn) {
                    log('Установлено соединение с: ' + conn.peer, 'success');
                });

            } catch (e) {
                log('Критическая ошибка: ' + e.message, 'error');
                statusMessage.textContent = '❌ Ошибка инициализации: ' + e.message;
            }
        }

        async function requestCamera() {
            try {
                log('Запрос доступа к камере и микрофону...', 'info');
                statusMessage.textContent = 'Запрос доступа к камере...';
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                hasVideo = true;
                localVideo.srcObject = localStream;
                localVideo.classList.remove('hidden');
                audioOnlyPlaceholder.classList.add('hidden');
                camBtn.classList.remove('hidden');
                log('Камера и микрофон подключены', 'success');
                statusMessage.textContent = '✅ Камера и микрофон подключены';
                statusMessage.className = 'text-center text-sm text-emerald-400';
                return true;
            } catch (err) {
                log('Ошибка камеры: ' + err.message, 'error');
                statusMessage.textContent = '⚠️ Камера недоступна. Попробуйте "Только микрофон"';
                statusMessage.className = 'text-center text-sm text-yellow-400';
                return requestAudioOnly();
            }
        }

        async function requestAudioOnly() {
            try {
                log('Запрос доступа к микрофону...', 'info');
                statusMessage.textContent = 'Запрос доступа к микрофону...';
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: false, 
                    audio: true 
                });
                hasVideo = false;
                localVideo.classList.add('hidden');
                audioOnlyPlaceholder.classList.remove('hidden');
                camBtn.classList.add('hidden');
                log('Микрофон подключен', 'success');
                statusMessage.textContent = '✅ Микрофон подключен (аудиозвонок)';
                statusMessage.className = 'text-center text-sm text-emerald-400';
                return true;
            } catch (err) {
                log('Ошибка микрофона: ' + err.message, 'error');
                statusMessage.textContent = '❌ Микрофон недоступен. Проверьте разрешения.';
                statusMessage.className = 'text-center text-sm text-red-400';
                return false;
            }
        }

        function startCall() {
            const remoteId = remoteIdInput.value.trim();
            if (!remoteId) {
                alert('Введите ID собеседника');
                return;
            }
            if (!localStream) {
                alert('Сначала нажмите "Видео + Микрофон" или "Только микрофон"!');
                return;
            }
            if (!peer) {
                alert('PeerJS не инициализирован. Обновите страницу.');
                return;
            }

            log('Начало звонка на: ' + remoteId, 'info');
            statusMessage.textContent = 'Установка соединения...';
            callingOverlay.classList.remove('hidden');
            videoContainer.classList.remove('hidden');
            controls.classList.remove('hidden');

            currentCall = peer.call(remoteId, localStream);
            handleCall(currentCall);
        }

        function answerCall(call) {
            log('Ответ на звонок от: ' + call.peer, 'info');
            if (!localStream) {
                requestAudioOnly().then(function() {
                    if(localStream) {
                        videoContainer.classList.remove('hidden');
                        controls.classList.remove('hidden');
                        currentCall = call;
                        call.answer(localStream);
                        handleCall(call);
                    }
                });
                return;
            }
            
            videoContainer.classList.remove('hidden');
            controls.classList.remove('hidden');
            currentCall = call;
            call.answer(localStream);
            handleCall(call);
        }

        function handleCall(call) {
            call.on('stream', function(remoteStream) {
                log('Получен видеопоток от собеседника', 'success');
                remoteVideo.srcObject = remoteStream;
                callingOverlay.classList.add('hidden');
                statusMessage.textContent = '🟢 Звонок активен';
                statusMessage.className = 'text-center text-sm text-emerald-400 font-bold';
            });

            call.on('close', function() { 
                log('Звонок завершён', 'info');
                endCallUI(); 
            });
            
            call.on('error', function(err) {
                log('Ошибка звонка: ' + err, 'error');
                endCallUI();
            });
        }

        function endCall() {
            log('Завершение звонка', 'info');
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            endCallUI();
        }

        function endCallUI() {
            remoteVideo.srcObject = null;
            videoContainer.classList.add('hidden');
            controls.classList.add('hidden');
            callingOverlay.classList.add('hidden');
            statusMessage.textContent = 'Звонок завершен';
            statusMessage.className = 'text-center text-sm text-slate-400';
            remoteIdInput.value = '';
        }

        function toggleMic() {
            if (!localStream) return;
            isMicMuted = !isMicMuted;
            localStream.getAudioTracks().forEach(function(track) { track.enabled = !isMicMuted; });
            const btn = document.getElementById('micBtn');
            btn.textContent = isMicMuted ? '🔇' : '🎤';
            btn.classList.toggle('bg-red-600', isMicMuted);
            btn.classList.toggle('bg-slate-700', !isMicMuted);
            log(isMicMuted ? 'Микрофон выключен' : 'Микрофон включён', 'info');
        }

        function toggleCamera() {
            if (!localStream || !hasVideo) return;
            isCamMuted = !isCamMuted;
            localStream.getVideoTracks().forEach(function(track) { track.enabled = !isCamMuted; });
            const btn = document.getElementById('camBtn');
            btn.textContent = isCamMuted ? '📷' : '';
            btn.classList.toggle('bg-red-600', isCamMuted);
            btn.classList.toggle('bg-slate-700', !isCamMuted);
            localVideo.classList.toggle('hidden', isCamMuted);
            audioOnlyPlaceholder.classList.toggle('hidden', !isCamMuted);
            log(isCamMuted ? 'Камера выключена' : 'Камера включена', 'info');
        }

        function copyId() {
            const id = myIdInput.value;
            if (id && id !== 'Загрузка...') {
                navigator.clipboard.writeText(id).then(function() {
                    log('ID скопирован', 'success');
                    const orig = statusMessage.textContent;
                    statusMessage.textContent = '✅ ID скопирован!';
                    setTimeout(function() { statusMessage.textContent = orig; }, 2000);
                });
            }
        }

        window.addEventListener('load', function() {
            log('Страница загружена', 'info');
            initPeer();
            requestCamera();
        });

        window.addEventListener('beforeunload', function() {
            if (localStream) localStream.getTracks().forEach(function(t) { t.stop(); });
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
